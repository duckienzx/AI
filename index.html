<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hồng Vân AI | 19-in-1 Workflow Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #f472b6; --gold: #fbbf24; --bg: #020617;
            --glass-border: rgba(244, 114, 182, 0.25);
            --font-head: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Be Vietnam Pro', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100dvh; width: 100vw; background: var(--bg); color: #f1f5f9; overflow: hidden; font-family: var(--font-body); }

        /* NỀN SANG TRỌNG */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(at 0% 0%, rgba(244, 114, 182, 0.12) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(251, 191, 36, 0.08) 0px, transparent 50%);
            z-index: -1;
        }

        .app-shell { display: flex; width: 100%; height: 100dvh; position: relative; }

        /* SIDEBAR 19 TRỢ LÝ */
        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.93); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; z-index: 1001; transition: transform 0.4s ease;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        }
        .sidebar-header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid var(--glass-border); padding-top: calc(20px + env(safe-area-inset-top)); }
        .sidebar-header h1 { font-family: var(--font-head); font-size: 1.3rem; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }

        .category-list { flex: 1; overflow-y: auto; padding: 15px; }
        .category-item {
            padding: 14px 18px; margin-bottom: 8px; border-radius: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; font-size: 0.9rem; color: #94a3b8;
            font-family: var(--font-head); transition: 0.3s;
        }
        .category-item i { width: 20px; text-align: center; color: var(--primary); font-size: 1.1rem; }
        .category-item:hover { background: rgba(244, 114, 182, 0.1); color: #fff; }
        .category-item.active { background: var(--primary); color: #fff; font-weight: 700; box-shadow: 0 10px 25px rgba(244, 114, 182, 0.2); }

        /* MAIN CHAT AREA */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        header { padding: 10px 20px; height: calc(65px + env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); padding-top: env(safe-area-inset-top); backdrop-filter: blur(15px); z-index: 100; }
        .menu-toggle { font-size: 1.5rem; color: var(--primary); cursor: pointer; display: none; }
        .current-niche-title { font-family: var(--font-head); font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 25px; padding-bottom: 150px; }
        
        .bubble { max-width: 90%; padding: 18px 22px; border-radius: 25px; line-height: 1.7; font-size: 0.95rem; animation: fadeInUp 0.4s ease; position: relative; }
        .user-bubble { align-self: flex-end; background: linear-gradient(135deg, #f472b6, #db2777); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 10px 20px rgba(219,39,119,0.2); }
        .ai-bubble { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; backdrop-filter: blur(10px); }

        /* NÚT BẤM QUY TRÌNH */
        .btn-start { background: #fff; color: #000; border: none; padding: 12px 30px; border-radius: 20px; font-weight: 800; font-family: var(--font-head); cursor: pointer; margin-top: 15px; display: inline-flex; align-items: center; gap: 10px; }
        .option-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .btn-option { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 0.8rem; cursor: pointer; font-family: var(--font-head); transition: 0.3s; }
        .btn-option:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-2px); }

        /* INPUT AREA FIXED */
        .input-footer { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg) 80%, transparent); z-index: 1000; }
        .input-container { max-width: 900px; margin: 0 auto; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--primary); border-radius: 40px; padding: 6px 6px 6px 25px; display: flex; align-items: center; gap: 15px; backdrop-filter: blur(25px); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 1.1rem; }
        #send-btn { background: var(--primary); border: none; color: #fff; padding: 12px 25px; border-radius: 30px; font-weight: 800; cursor: pointer; font-family: var(--font-head); text-transform: uppercase; font-size: 0.8rem; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -320px; height: 100%; width: 290px; }
            .sidebar.open { transform: translateX(320px); }
            .menu-toggle { display: block; }
            .bubble { max-width: 95%; }
            #chat-flow { padding: 15px; padding-bottom: 120px; }
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="mesh-bg"></div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app-shell">
    <!-- SIDEBAR 19 CHỦ ĐỀ ĐẦY ĐỦ -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>HỒNG VÂN AI</h1>
            <p style="font-size: 0.5rem; opacity: 0.5; letter-spacing: 3px; margin-top: 5px;">VEO3 WORKFLOW</p>
        </div>
        <div class="category-list" id="niche-list"></div>
    </div>

    <div class="main-chat">
        <header>
            <div class="header-left">
                <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars-staggered"></i></div>
                <div class="current-niche-title" id="current-title">Sáng tạo kịch bản</div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <i class="fas fa-trash-can" style="color:#f87171; cursor:pointer; font-size: 1.1rem;" onclick="clearCurrentChat()"></i>
                <div style="font-family: var(--font-head); font-size: 0.7rem; font-weight: 900; color: var(--gold); border: 1.5px solid var(--gold); padding: 5px 15px; border-radius: 20px;">VIP ACCESS</div>
            </div>
        </header>

        <div id="chat-flow"></div>

        <div class="input-footer">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Trả lời AI hoặc chọn phương án...">
                <button id="send-btn" onclick="startAI()">KHỞI TẠO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "sk-db602b70907695501c6675b193db83d0e701d37a7f232cd71ec5e6b616155bfb";
    const ENDPOINT = "https://api.orimise.com/v1/chat/completions";

    // DANH SÁCH 19 TRỢ LÝ ĐẦY ĐỦ
    const NICHES = [
        { id: "thoitrang", name: "Thời trang Viral", icon: "fa-shirt" },
        { id: "daoly", name: "Đạo lý Người que", icon: "fa-person-rays" },
        { id: "doanvat", name: "Đồ ăn vặt Affiliate", icon: "fa-hotdog" },
        { id: "giadung", name: "Đồ gia dụng thông minh", icon: "fa-house-laptop" },
        { id: "suckhoe", name: "Sức khỏe & Đời sống", icon: "fa-heart-pulse" },
        { id: "lamdep", name: "Làm đẹp (Beauty)", icon: "fa-wand-magic-sparkles" },
        { id: "nhanhoa", name: "Sức khỏe nhân hóa", icon: "fa-user-doctor" },
        { id: "tienganh", name: "Học tiếng Anh mỗi ngày", icon: "fa-language" },
        { id: "caycanh", name: "Video Cây cảnh/Sân vườn", icon: "fa-leaf" },
        { id: "giaydep", name: "Bán Giày dép triệu view", icon: "fa-shoe-prints" },
        { id: "loikhuyen_sacdep", name: "Lời khuyên Sắc đẹp", icon: "fa-face-smile" },
        { id: "loikhuyen_suckhoe", name: "Lời khuyên Sức khỏe", icon: "fa-kit-medical" },
        { id: "mechong", name: "Mẹ chồng - Nàng dâu", icon: "fa-people-arrows" },
        { id: "noithat", name: "Video Bán Nội thất", icon: "fa-couch" },
        { id: "tuixach", name: "Review Túi xách", icon: "fa-bag-shopping" },
        { id: "spa", name: "Video Spa chuyên nghiệp", icon: "fa-spa" },
        { id: "batdongsan", name: "Bất động sản cao cấp", icon: "fa-building" },
        { id: "xemay", name: "Quảng cáo Xe máy", icon: "fa-motorcycle" },
        { id: "daoly_animated", name: "Hoạt hình Đạo lý", icon: "fa-clapperboard" }
    ];

    let currentId = "thoitrang";
    let allHistories = JSON.parse(localStorage.getItem('hongvan_workflow_v4')) || {};

    const listEl = document.getElementById('niche-list');
    NICHES.forEach(n => {
        const div = document.createElement('div');
        div.className = "category-item";
        div.id = "btn-" + n.id;
        div.innerHTML = `<i class="fas ${n.icon}"></i> ${n.name}`;
        div.onclick = () => selectAssistant(n.id);
        listEl.appendChild(div);
    });

    function selectAssistant(id) {
        currentId = id;
        document.querySelectorAll('.category-item').forEach(e => e.classList.remove('active'));
        const activeBtn = document.getElementById('btn-'+id);
        if(activeBtn) activeBtn.classList.add('active');
        document.getElementById('current-title').innerText = NICHES.find(x=>x.id===id).name;
        if(window.innerWidth <= 768) toggleMenu();
        renderChat();
    }

    function renderChat() {
        const flow = document.getElementById('chat-flow');
        flow.innerHTML = '';
        const history = allHistories[currentId] || [];
        
        if(history.length === 0) {
            addBubble('ai', `Chào chị **Hồng Vân**, em là chuyên gia **${NICHES.find(x=>x.id===currentId).name}**. <br><br>Nhấn nút bên dưới để bắt đầu quy trình khởi tạo kịch bản triệu view nhé!<br><button class="btn-start" onclick="sendForm()"><i class="fas fa-play"></i> BẮT ĐẦU</button>`);
        } else {
            history.forEach(m => addBubble(m.role, m.content));
        }
        flow.scrollTop = flow.scrollHeight;
    }

    function sendForm() {
        const form = `Hãy trả lời ngắn gọn theo form này và gửi kèm ảnh nhân vật nếu có:
- Chủ đề:
- Lời khuyên chính:
- Thói quen xấu:
- Mục tiêu:
- Đối tượng xem:
- Mục tiêu video:
- Nhân vật xuất hiện: Có/Không
- AI tự tạo nhân vật: Có/Không
- Giới tính & Độ tuổi:
- Phong cách & Tone video:
- Giọng đọc:`;
        addBubble('ai', form);
        saveMsg(currentId, 'assistant', form);
    }

    async function startAI(forcedText = null) {
        const inp = document.getElementById('user-input');
        const txt = forcedText || inp.value.trim();
        if(!txt) return;

        addBubble('user', txt);
        saveMsg(currentId, 'user', txt);
        inp.value = '';

        const load = document.createElement('div');
        load.className = 'bubble ai-bubble';
        load.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Chị Hồng Vân đợi em chút...`;
        document.getElementById('chat-flow').appendChild(load);

        try {
            const currentNiche = NICHES.find(x=>x.id===currentId).name;
            const systemMsg = `Bạn là trợ lý Đạo diễn chuyên gia ngách ${currentNiche} của chị Hồng Vân.
            Quy trình:
            1. Nếu người dùng gửi Form, hãy ĐỀ XUẤT 3 PHƯƠNG ÁN (A, B, C) về SỐ CẢNH.
            2. Tiếp theo ĐỀ XUẤT 3 GIỌNG ĐỌC.
            3. Tiếp theo ĐỀ XUẤT 3 DẠNG VIDEO.
            4. Tiếp theo ĐỀ XUẤT 5 HOOK MỞ ĐẦU.
            5. Cuối cùng xuất FULL STORYBOARD (Prompt ảnh, Prompt video, Voiceover tiếng Việt văn nói).
            Luôn gọi 'Chị Hồng Vân', xưng 'Em'. Dùng định dạng 'Phương án A/B/C' để hệ thống tạo nút bấm.`;

            const res = await fetch(ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "gpt-5.5",
                    messages: [{ role: "system", content: systemMsg }, ...(allHistories[currentId] || [])]
                })
            });

            const data = await res.json();
            document.getElementById('chat-flow').removeChild(load);
            const aiRes = data.choices[0].message.content;
            
            addBubble('ai', aiRes);
            saveMsg(currentId, 'assistant', aiRes);
            detectAndRenderButtons(aiRes);

        } catch(e) { alert("Lỗi kết nối API Orimise!"); }
    }

    function detectAndRenderButtons(text) {
        const flow = document.getElementById('chat-flow');
        // Phát hiện A/B/C
        if (text.includes("Phương án A") || text.includes("Mời bạn chọn")) {
            const group = document.createElement('div');
            group.className = 'option-group';
            ['A', 'B', 'C'].forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn-option'; b.innerText = `Chọn Phương án ${opt}`;
                b.onclick = () => startAI(`Tôi chọn phương án ${opt}`);
                group.appendChild(b);
            });
            flow.appendChild(group);
        }
        // Phát hiện Hook 1/2/3/4/5
        if (text.includes("Hook 1") || text.includes("Mời bạn chọn hook")) {
            const group = document.createElement('div');
            group.className = 'option-group';
            [1, 2, 3, 4, 5].forEach(num => {
                const b = document.createElement('button');
                b.className = 'btn-option'; b.innerText = `Chọn Hook ${num}`;
                b.onclick = () => startAI(`Tôi chọn Hook ${num}`);
                group.appendChild(b);
            });
            flow.appendChild(group);
        }
        flow.scrollTop = flow.scrollHeight;
    }

    function addBubble(role, text) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${role}-bubble`;
        div.innerHTML = marked.parse(text);
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    function saveMsg(id, role, content) {
        if(!allHistories[id]) allHistories[id] = [];
        allHistories[id].push({role, content});
        localStorage.setItem('hongvan_workflow_v4', JSON.stringify(allHistories));
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
    function clearCurrentChat() { if(confirm("Xóa lịch sử mục này?")) { allHistories[currentId] = []; localStorage.setItem('hongvan_workflow_v4', JSON.stringify(allHistories)); renderChat(); } }
    window.onload = () => selectAssistant('thoitrang');
    document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') startAI(); });
</script>
</body>
</html>
