<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hồng Vân AI Studio | Professional 19-in-1</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #f472b6; /* Rose Pink */
            --gold: #fbbf24;
            --bg: #020617;
            --glass-border: rgba(244, 114, 182, 0.25);
            --font-head: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Be Vietnam Pro', sans-serif;
        }

        /* RESET & BASE CĂN CHỈNH DVH (HẾT LỆCH) */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100dvh; width: 100vw; 
            background: var(--bg); color: #f1f5f9; 
            overflow: hidden; font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        /* NỀN MESH GRADIENT SANG TRỌNG */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(at 0% 0%, rgba(244, 114, 182, 0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(251, 191, 36, 0.05) 0px, transparent 50%);
            z-index: -1;
        }

        .app-shell { display: flex; width: 100%; height: 100dvh; position: relative; }

        /* SIDEBAR (PC & MOBILE) */
        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.85);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; z-index: 1001;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        }

        .sidebar-header { 
            padding: 40px 20px 20px; text-align: center; 
            border-bottom: 1px solid var(--glass-border);
            padding-top: calc(20px + env(safe-area-inset-top));
        }
        .sidebar-header h1 { font-family: var(--font-head); font-size: 1.3rem; color: var(--primary); letter-spacing: 2px; }

        .category-list { flex: 1; overflow-y: auto; padding: 10px; }
        .category-item {
            padding: 14px 18px; margin-bottom: 5px; border-radius: 14px;
            cursor: pointer; display: flex; align-items: center; gap: 12px;
            font-size: 0.85rem; color: #94a3b8; font-family: var(--font-head); transition: 0.3s;
        }
        .category-item i { width: 20px; text-align: center; color: var(--primary); }
        .category-item.active { background: var(--primary); color: #fff; font-weight: 700; box-shadow: 0 10px 20px rgba(244, 114, 182, 0.2); }

        /* MAIN CONTENT */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        header {
            padding: 10px 20px; height: calc(60px + env(safe-area-inset-top));
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.4);
            padding-top: env(safe-area-inset-top); backdrop-filter: blur(10px);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { font-size: 1.5rem; color: var(--primary); cursor: pointer; display: none; }
        .current-niche-name { font-family: var(--font-head); font-weight: 800; font-size: 0.9rem; text-transform: uppercase; }

        /* KHUNG CHAT TỰ ĐỘNG CĂN CHỈNH */
        #chat-flow {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 25px;
            padding-bottom: 150px; /* Chừa chỗ cho thanh nhập liệu */
        }

        .bubble { max-width: 85%; padding: 18px 22px; border-radius: 25px; line-height: 1.7; font-size: 0.95rem; animation: fadeInUp 0.4s ease; }
        .user-bubble { align-self: flex-end; background: linear-gradient(135deg, #f472b6, #db2777); color: #fff; border-bottom-right-radius: 4px; }
        .ai-bubble { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }

        /* STORYBOARD & COPY BUTTONS */
        .media-box { width: 100%; border-radius: 20px; border: 1px solid var(--glass-border); margin-top: 15px; overflow: hidden; background: #000; }
        .media-box img { width: 100%; display: block; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn-action {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 0.75rem;
            font-family: var(--font-head); cursor: pointer; display: flex; align-items: center; gap: 6px;
        }

        /* INPUT FOOTER CỐ ĐỊNH CHUẨN ĐÁY */
        .input-footer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 10px 20px calc(15px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            z-index: 1000;
        }
        .input-container {
            max-width: 900px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.08); border: 1px solid var(--primary);
            border-radius: 35px; padding: 6px 6px 6px 22px;
            display: flex; align-items: center; gap: 10px; backdrop-filter: blur(20px);
        }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 1rem; padding: 10px 0; }
        #send-btn { 
            background: var(--primary); border: none; color: #fff; 
            padding: 12px 25px; border-radius: 30px; font-weight: 800; cursor: pointer;
            font-family: var(--font-head); font-size: 0.8rem;
        }

        /* RESPONSIVE CHO ĐIỆN THOẠI */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -320px; height: 100%; width: 280px; }
            .sidebar.open { transform: translateX(320px); }
            .menu-toggle { display: block; }
            .bubble { max-width: 95%; }
            #chat-flow { padding: 15px; padding-bottom: 120px; }
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="mesh-bg"></div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app-shell">
    <!-- 19 TRỢ LÝ ĐẦY ĐỦ -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>HỒNG VÂN AI</h1>
        </div>
        <div class="category-list" id="niche-list"></div>
    </div>

    <div class="main-chat">
        <header>
            <div class="header-left">
                <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars-staggered"></i></div>
                <div class="current-niche-name" id="current-title">Sáng tạo kịch bản</div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <i class="fas fa-trash-can" style="color:#f87171; cursor:pointer;" onclick="clearChat()"></i>
                <div style="font-size: 0.6rem; font-weight: 900; color: var(--gold); border: 2px solid var(--gold); padding: 5px 12px; border-radius: 20px;">VIP</div>
            </div>
        </header>

        <div id="chat-flow"></div>

        <div class="input-footer">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Chị Vân nhập sản phẩm hoặc ý tưởng...">
                <button id="send-btn" onclick="startAI()">KHỞI TẠO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "sk-db602b70907695501c6675b193db83d0e701d37a7f232cd71ec5e6b616155bfb";
    const ENDPOINT = "https://api.orimise.com/v1/chat/completions";

    // DANH SÁCH 19 TRỢ LÝ ĐẦY ĐỦ CỦA CHỊ HỒNG VÂN
    const NICHES = [
        { id: "thoitrang", name: "Thời trang Viral", icon: "fa-shirt" },
        { id: "daoly", name: "Đạo lý Người que", icon: "fa-person-rays" },
        { id: "doanvat", name: "Đồ ăn vặt Affiliate", icon: "fa-cookie-bite" },
        { id: "giadung", name: "Đồ gia dụng thông minh", icon: "fa-blender" },
        { id: "suckhoe", name: "Sức khỏe & Đời sống", icon: "fa-heart-pulse" },
        { id: "lamdep", name: "Làm đẹp (Beauty)", icon: "fa-wand-magic-sparkles" },
        { id: "nhanhoa", name: "Sức khỏe nhân hóa", icon: "fa-user-doctor" },
        { id: "tienganh", name: "Học tiếng Anh mỗi ngày", icon: "fa-language" },
        { id: "caycanh", name: "Video Cây cảnh/Sân vườn", icon: "fa-leaf" },
        { id: "giaydep", name: "Bán Giày dép triệu view", icon: "fa-shoe-prints" },
        { id: "loikhuyen_sacdep", name: "Lời khuyên Sắc đẹp", icon: "fa-face-smile" },
        { id: "loikhuyen_suckhoe", name: "Lời khuyên Sức khỏe", icon: "fa-kit-medical" },
        { id: "mechong", name: "Mẹ chồng - Nàng dâu", icon: "fa-people-arrows" },
        { id: "noithat", name: "Video Bán Nội thất", icon: "fa-couch" },
        { id: "tuixach", name: "Review Túi xách", icon: "fa-bag-shopping" },
        { id: "spa", name: "Video Spa chuyên nghiệp", icon: "fa-spa" },
        { id: "batdongsan", name: "Bất động sản cao cấp", icon: "fa-building" },
        { id: "xemay", name: "Quảng cáo Xe máy", icon: "fa-motorcycle" },
        { id: "daoly_animated", name: "Hoạt hình Đạo lý", icon: "fa-clapperboard" }
    ];

    let currentId = "thoitrang";
    let history = JSON.parse(localStorage.getItem('hongvan_final_v2')) || {};

    const list = document.getElementById('niche-list');
    NICHES.forEach(n => {
        const div = document.createElement('div');
        div.className = "category-item";
        div.id = "btn-" + n.id;
        div.innerHTML = `<i class="fas ${n.icon}"></i> ${n.name}`;
        div.onclick = () => selectNiche(n.id);
        list.appendChild(div);
    });

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function selectNiche(id) {
        currentId = id;
        document.querySelectorAll('.category-item').forEach(e => e.classList.remove('active'));
        document.getElementById('btn-'+id).classList.add('active');
        document.getElementById('current-title').innerText = NICHES.find(x=>x.id===id).name;
        if(window.innerWidth <= 768) toggleMenu();
        renderChat();
    }

    function renderChat() {
        const flow = document.getElementById('chat-flow');
        flow.innerHTML = '';
        const msgs = history[currentId] || [];
        if(msgs.length === 0) {
            addBubble('ai', `Chào chị **Hồng Vân**, em đã sẵn sàng lên kịch bản **${NICHES.find(x=>x.id===currentId).name}**. Chị nhập sản phẩm nhé!`);
        } else {
            msgs.forEach(m => addBubble(m.role, m.content));
        }
        flow.scrollTop = flow.scrollHeight;
    }

    function addBubble(role, text) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${role}-bubble`;
        div.innerHTML = marked.parse(text);

        if(role === 'ai') {
            const btns = document.createElement('div');
            btns.className = 'action-btns';
            const bCopy = document.createElement('button');
            bCopy.className = 'btn-action'; bCopy.innerHTML = `<i class="fas fa-copy"></i> Kịch bản`;
            bCopy.onclick = () => { navigator.clipboard.writeText(text); alert("Đã copy kịch bản!"); };
            
            const bPrompt = document.createElement('button');
            bPrompt.className = 'btn-action'; bPrompt.innerHTML = `<i class="fas fa-magic"></i> Prompts`;
            bPrompt.onclick = () => {
                const ps = text.match(/Prompt cho Veo3:.*?\n/gi);
                if(ps) { navigator.clipboard.writeText(ps.join("\n")); alert("Đã copy Prompt!"); }
            };
            btns.appendChild(bCopy); btns.appendChild(bPrompt);
            div.appendChild(btns);

            const reg = /Prompt cho Veo3:\s*(.*)/gi;
            let m;
            while((m = reg.exec(text)) !== null) {
                const i = document.createElement('img');
                i.style.width = '100%'; i.style.borderRadius = '15px'; i.style.marginTop = '10px';
                i.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(m[1])}?width=600&height=400&nologo=true&seed=${Math.random()}`;
                div.appendChild(i);
            }
        }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    async function startAI() {
        const inp = document.getElementById('user-input');
        const txt = inp.value.trim();
        if(!txt) return;

        addBubble('user', txt);
        save(currentId, 'user', txt);
        inp.value = '';

        const load = document.createElement('div');
        load.className = 'bubble ai-bubble';
        load.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Em đang soạn kịch bản...`;
        document.getElementById('chat-flow').appendChild(load);

        try {
            const res = await fetch(ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "gpt-5.5",
                    messages: [
                        { role: "system", content: `Bạn là trợ lý VIP của chị Hồng Vân. Chuyên gia ${NICHES.find(x=>x.id===currentId).name}. Viết kịch bản video viral. Mỗi cảnh phải kèm: Prompt cho Veo3: [tiếng Anh]. Gọi chị Hồng Vân, xưng em.` },
                        { role: "user", content: txt }
                    ]
                })
            });
            const data = await res.json();
            document.getElementById('chat-flow').removeChild(load);
            const aiTxt = data.choices[0].message.content;
            addBubble('ai', aiTxt);
            save(currentId, 'ai', aiTxt);
        } catch(e) { alert("Lỗi API!"); }
    }

    function save(id, role, content) {
        if(!history[id]) history[id] = [];
        history[id].push({role, content});
        localStorage.setItem('hongvan_final_v2', JSON.stringify(history));
    }

    function clearChat() { if(confirm("Xóa lịch sử mục này?")) { history[currentId] = []; renderChat(); } }
    window.onload = () => selectNiche('thoitrang');
</script>
</body>
</html>
